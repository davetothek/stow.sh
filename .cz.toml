[tool.commitizen]
name = "cz_conventional_commits"
version = "0.16.0"
# Stay in 0.x: breaking changes bump the minor version, not to 1.0.0.
major_version_zero = true
tag_format = "v$version"
bump_message = "chore: bump version $current_version → $new_version"
version_files = [
    "src/version.sh:STOW_SH_VERSION",
]
