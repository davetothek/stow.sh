# SPDX-License-Identifier: MIT
name: CI

# Runs on every push and pull request so regressions are caught before a
# release — not at tag time (see release.yml) when it is already too late.
on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck

      - name: Run shellcheck
        run: shellcheck src/*.sh bin/*.sh conditions.d/*.sh

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats

      - name: Run tests
        run: |
          # filter/integration tests create throwaway git repos
          git config --global user.email "ci@stow.sh"
          git config --global user.name "CI"
          bats --verbose-run test/
